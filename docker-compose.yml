version: "3.8"

services:
  api:
    build:
      context: ./video_management
      dockerfile: Dockerfile
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-secure-random-string}
      - DATABASE_URL=sqlite:///data/vms.db
      - MOONRAKER_URL=${MOONRAKER_URL:-http://your-printer-ip:4409}
      - MOONRAKER_API_KEY=${MOONRAKER_API_KEY:-}
      - YOUTUBE_CLIENT_SECRETS=${YOUTUBE_CLIENT_SECRETS:-}
      - YOUTUBE_TOKEN_FILE=data/youtube_token.json
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY:-}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET:-}
      - FFMPEG_PATH=ffmpeg
      - MAX_VIDEO_DURATION=60
      - OUTPUT_RESOLUTION=1080x1920
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  ui:
    build:
      context: ./video_management/ui/vue
      dockerfile: Dockerfile
      args:
        # Must include /api suffix - all backend routes are prefixed with /api
        # Production example: https://api.spoolup.alihadiozturk.com/api
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    depends_on:
      - api
