<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Video Management System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="card" style="text-align: center;">
            <h1 style="margin-bottom: 0.5rem;">Video Management System</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                Sign in to manage your videos
            </p>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        class="form-control"
                        placeholder="Enter username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Enter password"
                        required
                    />
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Sign In
                </button>
            </form>

            <p style="margin-top: 1rem; color: var(--text-secondary);">
                Don't have an account? <a href="#" style="color: var(--primary-color);">Contact admin</a>
            </p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
