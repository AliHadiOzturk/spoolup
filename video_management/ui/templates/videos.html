{% extends "base.html" %}

{% block title %}Videos - Video Management System{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Videos</h1>
    <p>Manage your recorded timelapse videos</p>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
        <div>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <input type="checkbox" id="select-all-checkbox" style="width: 18px; height: 18px; cursor: pointer;" onchange="videosManager.toggleSelectAll(this)">
                <h2 style="font-size: 1.25rem; font-weight: 600;">All Videos</h2>
            </div>
            <p style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem;">
                <span id="video-count">Loading...</span>
                <span id="sync-status" style="margin-left: 1rem; color: var(--text-secondary);"></span>
                <span id="selection-count" style="margin-left: 1rem; color: var(--primary-color); font-weight: 600; display: none;"></span>
            </p>
        </div>
        <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
            <div id="bulk-actions" style="display: none; gap: 0.5rem; align-items: center;">
                <span style="color: var(--text-secondary); font-size: 0.875rem; margin-right: 0.5rem;">Bulk actions:</span>
                <button class="btn btn-primary btn-sm" onclick="videosManager.bulkProcess()">Process Selected</button>
                <button class="btn btn-success btn-sm" onclick="videosManager.bulkUpload()">Upload Selected</button>
                <button class="btn btn-danger btn-sm" onclick="videosManager.bulkDelete()">Delete Selected</button>
            </div>
            <select id="sort-select" class="form-control" style="width: auto; min-width: 180px; font-size: 0.875rem;">
                <option value="date">Date (Newest First)</option>
                <option value="date_oldest">Date (Oldest First)</option>
                <option value="name">Name (A-Z)</option>
                <option value="name_desc">Name (Z-A)</option>
                <option value="duration">Duration</option>
            </select>
            <button id="sync-btn" class="btn btn-secondary" onclick="videosManager.syncFromPrinter()">
                <span id="sync-btn-text">Refresh from Printer</span>
            </button>
        </div>
    </div>
    <div id="sync-results" style="margin-bottom: 1rem;"></div>
    <div id="videos-container">
        <div class="loading-skeleton" style="height: 200px;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
class VideosManager {
    constructor() {
        this.currentSort = 'date';
        this.printers = [];
        this.selectedVideos = new Set();
        this.loadPrinters().then(() => {
            this.loadVideos();
            this.updateSyncStatus();
        });
        this.setupEventListeners();
    }

    setupEventListeners() {
        const sortSelect = document.getElementById('sort-select');
        if (sortSelect) {
            sortSelect.addEventListener('change', (e) => {
                this.currentSort = e.target.value;
                this.loadVideos();
            });
        }
    }

    async loadPrinters() {
        try {
            const response = await window.app.apiRequest('/api/printers');
            if (!response) return;
            this.printers = await response.json();
        } catch (err) {
            console.error('Failed to load printers:', err);
        }
    }

    async loadVideos() {
        const container = document.getElementById('videos-container');
        container.innerHTML = '<div class="loading-skeleton" style="height: 200px;"></div>';

        try {
            const response = await window.app.apiRequest(`/api/videos?sort_by=${this.currentSort}`);
            if (!response) return;

            const videos = await response.json();
            this.renderVideos(videos);
        } catch (err) {
            console.error('Failed to load videos:', err);
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <p>Failed to load videos</p>
                </div>
            `;
        }
    }

    async syncFromPrinter() {
        if (this.printers.length === 0) {
            window.app.showAlert('No printers configured. Please add a printer first.', 'error');
            return;
        }

        const syncBtn = document.getElementById('sync-btn');
        const syncBtnText = document.getElementById('sync-btn-text');
        const syncResults = document.getElementById('sync-results');

        syncBtn.disabled = true;
        syncBtnText.textContent = 'Syncing...';

        try {
            const printer = this.printers[0];
            const response = await window.app.apiRequest(`/api/printers/${printer.id}/sync`, {
                method: 'POST'
            });

            if (!response) {
                syncBtn.disabled = false;
                syncBtnText.textContent = 'Refresh from Printer';
                return;
            }

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('last_sync_time', new Date().toISOString());
                this.updateSyncStatus();

                if (result.synced_videos > 0) {
                    syncResults.innerHTML = `
                        <div class="alert alert-success">
                            ✓ Sync completed: ${result.synced_videos} new video${result.synced_videos !== 1 ? 's' : ''} found
                        </div>
                    `;
                } else {
                    syncResults.innerHTML = `
                        <div class="alert alert-info">
                            ℹ No new videos found
                        </div>
                    `;
                }

                this.loadVideos();
            } else {
                const error = await response.json();
                syncResults.innerHTML = `
                    <div class="alert alert-error">
                        ✗ Sync failed: ${error.detail || 'Unknown error'}
                    </div>
                `;
            }
        } catch (err) {
            console.error('Sync failed:', err);
            syncResults.innerHTML = `
                <div class="alert alert-error">
                    ✗ Sync failed: ${err.message}
                </div>
            `;
        } finally {
            syncBtn.disabled = false;
            syncBtnText.textContent = 'Refresh from Printer';
            setTimeout(() => {
                syncResults.innerHTML = '';
            }, 5000);
        }
    }

    updateSyncStatus() {
        const syncStatusEl = document.getElementById('sync-status');
        const lastSync = localStorage.getItem('last_sync_time');

        if (!lastSync) {
            syncStatusEl.textContent = '• Never synced';
            return;
        }

        const date = new Date(lastSync);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        let text = '• Last synced: ';
        if (diffMins < 1) {
            text += 'Just now';
        } else if (diffMins < 60) {
            text += `${diffMins} minute${diffMins !== 1 ? 's' : ''} ago`;
        } else if (diffHours < 24) {
            text += `${diffHours} hour${diffHours !== 1 ? 's' : ''} ago`;
        } else {
            text += `${diffDays} day${diffDays !== 1 ? 's' : ''} ago`;
        }

        syncStatusEl.textContent = text;
    }

    toggleSelectAll(checkbox) {
        const checkboxes = document.querySelectorAll('.video-checkbox');
        checkboxes.forEach(cb => {
            cb.checked = checkbox.checked;
            this.toggleVideoSelection(cb.dataset.videoId, checkbox.checked);
        });
        this.updateBulkActions();
    }

    toggleVideoSelection(videoId, selected) {
        if (selected) {
            this.selectedVideos.add(videoId);
        } else {
            this.selectedVideos.delete(videoId);
        }
        this.updateBulkActions();
    }

    updateBulkActions() {
        const bulkActions = document.getElementById('bulk-actions');
        const selectionCount = document.getElementById('selection-count');
        const selectAll = document.getElementById('select-all-checkbox');

        if (this.selectedVideos.size > 0) {
            bulkActions.style.display = 'flex';
            selectionCount.style.display = 'inline';
            selectionCount.textContent = `${this.selectedVideos.size} selected`;
        } else {
            bulkActions.style.display = 'none';
            selectionCount.style.display = 'none';
            if (selectAll) selectAll.checked = false;
        }
    }

    bulkDelete() {
        const ids = Array.from(this.selectedVideos);
        alert('Not yet implemented: Delete ' + ids.length + ' videos');
    }

    bulkProcess() {
        const ids = Array.from(this.selectedVideos);
        alert('Not yet implemented: Process ' + ids.length + ' videos');
    }

    bulkUpload() {
        const ids = Array.from(this.selectedVideos);
        alert('Not yet implemented: Upload ' + ids.length + ' videos');
    }

    renderVideos(videos) {
        const container = document.getElementById('videos-container');
        const countEl = document.getElementById('video-count');

        countEl.textContent = `${videos.length} video${videos.length !== 1 ? 's' : ''} found`;

        if (videos.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📹</div>
                    <h3 style="margin-bottom: 0.5rem; color: var(--text-primary);">No videos yet</h3>
                    <p style="margin-bottom: 1.5rem; max-width: 400px; margin-left: auto; margin-right: auto;">
                        Your video library is empty. Sync your printer to import timelapse videos and start managing your 3D print recordings.
                    </p>
                    <button class="btn btn-primary" onclick="videosManager.syncFromPrinter()">
                        <span>Sync from Printer</span>
                    </button>
                </div>
            `;
            return;
        }

        container.innerHTML = `
            <div class="video-grid">
                ${videos.map(video => `
                    <div class="video-card fade-in">
                        <div style="position: relative;">
                            <div class="video-thumbnail" style="padding: 0; overflow: hidden; background: #000;">
                                ${video.thumbnail_path ? `<img src="${video.thumbnail_path}" alt="${this.escapeHtml(video.filename)}" style="width: 100%; height: 100%; object-fit: cover;" loading="lazy" onerror="this.parentElement.innerHTML='🎬'; this.parentElement.style.padding='2rem';">` : '🎬'}
                            </div>
                            <input type="checkbox"
                                   class="video-checkbox"
                                   data-video-id="${video.id}"
                                   style="position: absolute; top: 8px; left: 8px; width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary-color);"
                                   onchange="videosManager.toggleVideoSelection('${video.id}', this.checked)">
                        </div>
                        <div class="video-info">
                            <div class="video-title" title="${this.escapeHtml(video.filename)}">
                                ${this.escapeHtml(video.filename)}
                            </div>
                            <div class="video-meta">
                                <span>${window.app.formatFileSize(video.size_bytes)}</span>
                                <span>${this.formatDate(video.created_at)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                                <span class="badge ${video.duration_seconds > 0 ? 'badge-info' : 'badge-warning'}">
                                    ${video.duration_seconds > 0 ? window.app.formatDuration(video.duration_seconds) : 'No duration'}
                                </span>
                                <span class="badge ${video.metadata_status === 'complete' ? 'badge-success' : 'badge-warning'}">
                                    ${video.metadata_status === 'complete' ? '✓ Complete' : '⏳ Pending'}
                                </span>
                            </div>
                            <div class="video-actions">
                                <a href="/videos/${video.id}" class="btn btn-primary btn-sm" style="flex: 1; justify-content: center;">View</a>
                                <a href="/videos/${video.id}" class="btn btn-secondary btn-sm" style="flex: 1; justify-content: center;">Edit</a>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;

        return date.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
        });
    }
}

let videosManager;
document.addEventListener('DOMContentLoaded', () => {
    videosManager = new VideosManager();
});
</script>
{% endblock %}
